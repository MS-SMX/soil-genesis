autogama:
  definizione: >
    Fecondazione con il proprio polline.

eterogama:
  definizione: >
    Richiede polline proveniente da un altro individuo.

miscuglio_evolutivo:
  definizione: >
    Popolazione ottenuta dalla coltivazione congiunta di più varietà,
    lasciate evolvere naturalmente.

germinabilita:
  definizione: >
    Percentuale di semi che germinano in condizioni controllate.